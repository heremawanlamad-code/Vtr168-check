        .win-rate { font-size: 13px; font-weight: bold; min-width: 35px; text-align: right; }

    function showCamps() {
        document.getElementById('camp-area').style.display = 'block';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('btn-main').style.display = 'none';
        document.getElementById('note-info').style.display = 'none';
    }

    function loadGames(camp) {
        const games = gamesDB[camp];
        const seed = new Date().getDate() + Math.floor(new Date().getHours()/6) + camp.length;
        let html = "";
        
        games.forEach((game, idx) => {
            const name = game.n;
            const img = game.i;
            const rate = ((seed * (idx + 19)) % 40) + 58; // แรนดอม 58-98%
            const color = rate > 90 ? "#ffd700" : (rate > 75 ? "#ff79c6" : "#bd93f9");
            
            html += `
            <div class="game-item">
                <img src="${img}" class="game-img" onerror="this.src='https://via.placeholder.com/65/222/ffd700?text=GAME'">
                <div class="game-info">
                    <div class="row-top">
                        <span class="game-name">${name}</span>
                        <a href="${targetLink}" class="play-btn">เริ่มเกม</a>
                    </div>
                    <div class="bar-container">
                        <div class="bar-bg">
                            <div class="bar-fill" style="width:${rate}%; background:${color}; box-shadow: 0 0 10px ${color};"></div>
                        </div>
                        <span class="win-rate" style="color:${color}">${rate}%</span>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('title').innerText = camp;
        document.getElementById('game-list').innerHTML = html;
        document.getElementById('camp-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }
